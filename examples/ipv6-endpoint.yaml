# Client → server via IPv6 transport (tunnel still carries IPv4).
# IPv6 endpoints need bracket notation: [address]:port
# .env: WG_SERVER_PRIV/PUB, WG_CLIENT_PRIV/PUB, WG_SERVER_IPV6
# Usage: docker compose -f examples/ipv6-endpoint.yaml up

services:
  server:
    image: ${COMPWIRE_IMAGE:-ivenos/compwire:latest}
    network_mode: host
    cap_add: [NET_ADMIN]
    environment:
      WG_ROLE: server
      WG_PRIVATE_KEY: ${WG_SERVER_PRIV}
      WG_PEER_CLIENT_PUBKEY: ${WG_CLIENT_PUB}
      WG_PEER_CLIENT_ALLOWED_IPS: 10.77.0.2/32
    restart: unless-stopped

  client:
    image: ${COMPWIRE_IMAGE:-ivenos/compwire:latest}
    network_mode: host
    cap_add: [NET_ADMIN]
    depends_on:
      server:
        condition: service_healthy
    environment:
      WG_ROLE: client
      WG_IFACE: wg1
      WG_PRIVATE_KEY: ${WG_CLIENT_PRIV}
      WG_SERVER_PUBKEY: ${WG_SERVER_PUB}
      WG_SERVER_ENDPOINT: "[${WG_SERVER_IPV6:-::1}]:51820"
    restart: unless-stopped
